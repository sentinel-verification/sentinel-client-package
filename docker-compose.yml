# ============================================================
# Sentinel Gateway - Enterprise Edge Protection
# Installs locally on your servers to block AI scraping bots.
# ============================================================
services:
  sentinel-edge:
    image: traefik:v3.3
    container_name: sentinel-edge
    restart: unless-stopped
    ports:
      - "80:8080" # Binds to their public web port
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
    networks:
      - sentinel-net

  sentinel-auth:
    image: sentinelverification/sentinel-auth:v5
    container_name: sentinel-auth
    restart: unless-stopped
    env_file: .env # Reads the client's wallet details
    networks:
      - sentinel-net
    depends_on:
      - sentinel-state

  sentinel-state:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: sentinel-state
    restart: unless-stopped
    command:
      - "--requirepass=${SENTINEL_CACHE_PASSWORD}"
      - "--maxmemory=512mb"
      - "--proactor_threads=2"
    networks:
      - sentinel-net

  sentinel-verifier:
    image: sentinelverification/sentinel-verifier:v5
    container_name: sentinel-verifier
    restart: unless-stopped
    env_file: .env
    networks:
      - sentinel-net
    depends_on:
      - sentinel-state

  # ==========================================
  # LOCAL TEST TARGET (Simulating Client API)
  # Do not push this to GitHub
  # ==========================================
  sentinel-target:
    image: nginx:alpine
    container_name: sentinel-target
    networks:
      - sentinel-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.target.rule=Host(`localhost`)"
      - "traefik.http.routers.target.middlewares=sentinel-forwardauth@file"

networks:
  sentinel-net:
    driver: bridge