    const readBtn = document.getElementById('readBtn');
    const result = document.getElementById('result');

    connectBtn.onclick = async () => {
      if (!window.ethereum) {
        status.textContent = 'MetaMask not detected!';
        status.style.color = 'red';
        return;
      }
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send('eth_requestAccounts', []);
      signer = provider.getSigner();
      const address = await signer.getAddress();
      walletDiv.textContent = 'Connected wallet: ' + address;
      status.textContent = 'Connected!';
      status.style.color = 'green';
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    };

    readBtn.onclick = async () => {
      if (!contract) {
        result.textContent = 'Connect wallet first!';
        return;
      }
      try {
        // Example: read the company address (public variable)
        const company = await contract.company();
        result.textContent = 'Company address: ' + company;
      } catch (e) {
        result.textContent = 'Error: ' + e.message;
      }
