<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentinel Referral Registry v2 Test</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
body { font-family: Arial, sans-serif; margin: 2em; background: #1a1a2e; color: #e0e0e0; }
h2 { color: #00d4ff; }
#status { margin-bottom: 1em; color: #00ff88; }
button { margin: 0.5em 0.5em 0.5em 0; padding: 0.5em 1em; background: #0052FF; color: white; border: none; border-radius: 4px; cursor: pointer; }
button:hover { background: #003ecb; }
input { padding: 0.5em; width: 500px; font-family: monospace; background: #2a2a4a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; }
pre { background: #2a2a4a; padding: 1em; border-radius: 4px; overflow-x: auto; }
label { display: block; margin-top: 1em; color: #aaa; }
.section { margin: 1.5em 0; padding: 1em; border: 1px solid #333; border-radius: 8px; }
</style>
</head>
<body>
<h2>Sentinel Referral Registry v2 Test</h2>
<p style="color:#888;">Contract: <code>0x3591f64D970B360231b62d035b1ff4a9C69897e0</code> (Base Mainnet)</p>
<div id="status">Not connected</div>
<button id="connectBtn">Connect Wallet</button>
<div id="wallet"></div>

<div class="section">
<h3>Look Up Referral</h3>
<label>Referral ID (bytes32 hash):</label>
<input id="refId" placeholder="0x..." />
<br>
<button id="readBtn">Get Referral</button>
<pre id="result">Enter a referral ID and click "Get Referral"</pre>
</div>

<div class="section">
<h3>Quick Status Check</h3>
<button id="statusBtn">Check Status</button>
<pre id="statusResult">Enter a referral ID above first</pre>
</div>

<script>
const CONTRACT_ADDRESS = '0x3591f64D970B360231b62d035b1ff4a9C69897e0';
const ABI = [{"inputs": [], "name": "ReferralAlreadyClaimed", "type": "error"}, {"inputs": [], "name": "ReferralAlreadyExists", "type": "error"}, {"inputs": [], "name": "ReferralNotFound", "type": "error"}, {"anonymous": false, "inputs": [{"indexed": true, "internalType": "bytes32", "name": "referralId", "type": "bytes32"}, {"indexed": true, "internalType": "address", "name": "business", "type": "address"}], "name": "ReferralClaimed", "type": "event"}, {"anonymous": false, "inputs": [{"indexed": true, "internalType": "bytes32", "name": "referralId", "type": "bytes32"}, {"indexed": true, "internalType": "address", "name": "referrer", "type": "address"}], "name": "ReferralCreated", "type": "event"}, {"inputs": [{"internalType": "bytes32", "name": "referralId", "type": "bytes32"}, {"internalType": "address", "name": "business", "type": "address"}, {"internalType": "bytes", "name": "", "type": "bytes"}], "name": "claimReferral", "outputs": [], "stateMutability": "nonpayable", "type": "function"}, {"inputs": [{"internalType": "bytes32", "name": "referralId", "type": "bytes32"}, {"internalType": "address", "name": "referrer", "type": "address"}, {"internalType": "bytes", "name": "", "type": "bytes"}], "name": "createReferral", "outputs": [], "stateMutability": "nonpayable", "type": "function"}, {"inputs": [{"internalType": "bytes32", "name": "referralId", "type": "bytes32"}], "name": "getReferral", "outputs": [{"components": [{"internalType": "address", "name": "company", "type": "address"}, {"internalType": "address", "name": "referrer", "type": "address"}, {"internalType": "address", "name": "business", "type": "address"}, {"internalType": "uint64", "name": "createdAt", "type": "uint64"}, {"internalType": "uint64", "name": "claimedAt", "type": "uint64"}, {"internalType": "uint8", "name": "status", "type": "uint8"}], "internalType": "struct SentinelEconomyReferralRegistry.Referral", "name": "", "type": "tuple"}], "stateMutability": "view", "type": "function"}, {"inputs": [{"internalType": "bytes32", "name": "", "type": "bytes32"}], "name": "referrals", "outputs": [{"internalType": "address", "name": "company", "type": "address"}, {"internalType": "address", "name": "referrer", "type": "address"}, {"internalType": "address", "name": "business", "type": "address"}, {"internalType": "uint64", "name": "createdAt", "type": "uint64"}, {"internalType": "uint64", "name": "claimedAt", "type": "uint64"}, {"internalType": "uint8", "name": "status", "type": "uint8"}], "stateMutability": "view", "type": "function"}];

let provider, signer, contract;
const statusEl = document.getElementById('status');
const walletDiv = document.getElementById('wallet');

document.getElementById('connectBtn').onclick = async () => {
  if (!window.ethereum) {
    statusEl.textContent = 'MetaMask not detected!';
    statusEl.style.color = 'red';
    return;
  }
  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send('eth_requestAccounts', []);
  signer = provider.getSigner();
  const address = await signer.getAddress();
  const network = await provider.getNetwork();
  walletDiv.textContent = 'Connected: ' + address + ' (Chain: ' + network.chainId + ')';
  statusEl.textContent = network.chainId === 8453 ? 'Connected to Base Mainnet' : 'Wrong network! Switch to Base (8453)';
  statusEl.style.color = network.chainId === 8453 ? '#00ff88' : 'orange';
  contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
};

document.getElementById('readBtn').onclick = async () => {
  const resultEl = document.getElementById('result');
  if (!contract) { resultEl.textContent = 'Connect wallet first!'; return; }
  const refId = document.getElementById('refId').value.trim();
  if (!refId) { resultEl.textContent = 'Enter a referral ID!'; return; }
  try {
    const ref = await contract.getReferral(refId);
    const statusMap = ['Active (Unclaimed)', 'Claimed', 'Revoked'];
    resultEl.textContent = JSON.stringify({
      referrer: ref.referrer,
      business: ref.business,
      createdAt: new Date(Number(ref.createdAt) * 1000).toISOString(),
      claimedAt: Number(ref.claimedAt) > 0 ? new Date(Number(ref.claimedAt) * 1000).toISOString() : 'Not claimed',
      status: statusMap[ref.status] || 'Unknown (' + ref.status + ')'
    }, null, 2);
  } catch (e) {
    resultEl.textContent = 'Error: ' + e.message;
  }
};

document.getElementById('statusBtn').onclick = async () => {
  const resultEl = document.getElementById('statusResult');
  if (!contract) { resultEl.textContent = 'Connect wallet first!'; return; }
  const refId = document.getElementById('refId').value.trim();
  if (!refId) { resultEl.textContent = 'Enter a referral ID above first!'; return; }
  try {
    const ref = await contract.getReferral(refId);
    const created = Number(ref.createdAt);
    if (created === 0) {
      resultEl.textContent = 'Referral NOT FOUND on-chain';
    } else if (ref.status === 0) {
      resultEl.textContent = 'Referral EXISTS and is UNCLAIMED - ready for a business to claim';
    } else {
      resultEl.textContent = 'Referral CLAIMED by: ' + ref.business;
    }
  } catch (e) {
    resultEl.textContent = 'Error: ' + e.message;
  }
};
</script>
</body>
</html>
